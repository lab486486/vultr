name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Fallback to known account if secret omitted
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '66b716eb6832b9626c866772cf2f3e11' }}
    steps:
      - name: Check secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN 이 비어 있습니다."
            echo "GitHub → Settings → Secrets and variables → Actions 에서"
            echo "Name 을 정확히 CLOUDFLARE_API_TOKEN 으로 추가했는지 확인해 주세요."
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN: present"
          echo "CLOUDFLARE_ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify Cloudflare auth
        run: npx wrangler@4 whoami

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy dist --project-name=vultr-seoul --branch=main
